  .ed-section-add-wrap {

    text-align: center;

    font-family: inherit;
    font-size: 14px;
    font-weight: 800;
    color: #1d4ed8;
    background: #eef3fc;

    africa:  { en: "AFRICA",  jp: "アフリカ",   intro: "多様な民族・言語・歴史を持つ大陸を、植民地史から現代の開発課題まで幅広く扱います。" },

let researchData = {
  asia: [ { title: "東アジアの近代化と都市発展", desc: "明治期以降の東アジア各国における都市化プロセスの比較研究", url: "https://example.com/research/asia-modernization" } ],
  oceania: [], europe: [], africa: [], america: []
};

const REGION_KEYS = ["asia", "oceania", "europe", "africa", "america"];
const REGION_LABELS = { asia: "アジア", oceania: "オセアニア", europe: "ヨーロッパ", africa: "アフリカ", america: "アメリカ" };
let currentPage = "home";

// ============================================================
// 便利関数
// ============================================================
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const k in (attrs || {})) {
    if (k === "class") e.className = attrs[k];
    else if (k === "style") e.style.cssText = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.forEach((c) => {
    if (c == null) return;
    e.append(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

// プレーンテキスト編集(改行なし想定の短文/長文どちらもOK)
function editable(tag, attrs, obj, key, opts) {
  const e = el(tag, attrs);
  e.textContent = obj[key] || "";
  try { e.contentEditable = "plaintext-only"; } catch (_) { e.contentEditable = "true"; }
  if (e.contentEditable !== "plaintext-only") e.contentEditable = "true";
  e.spellcheck = false;
  if (opts && opts.placeholder && !obj[key]) e.textContent = opts.placeholder;
  e.addEventListener("input", () => { obj[key] = e.textContent; });
  e.addEventListener("focus", () => {
    if (opts && opts.placeholder && obj[key] === "" && e.textContent === opts.placeholder) e.textContent = "";
  });
  e.addEventListener("blur", () => {
    if (opts && opts.placeholder && e.textContent.trim() === "") { e.textContent = opts.placeholder; obj[key] = ""; }
  });
  return e;
}

// リッチテキスト編集(リンク可)
function richEditable(tag, attrs, obj, key) {
  const e = el(tag, attrs);
  e.innerHTML = obj[key] || "ここに文章を入力…";
  e.contentEditable = "true";
  e.spellcheck = false;
  e.addEventListener("input", () => { obj[key] = e.innerHTML; });
  return e;
}

function ctlDel(onclick) {
  return el("button", { class: "ed-ctl del", onclick, title: "削除" }, "削除");
}
function ctlLink(onclick) {
  return el("button", { class: "ed-ctl link", onclick, title: "リンク設定" }, "🔗");
}
function controls(...btns) {
  return el("div", { class: "ed-controls" }, ...btns);
}

function promptUrl(current) {
  const url = prompt("リンク先のURLを入力してください。\n(別ページに飛ばす場合は asia.html のようなファイル名でもOK)", current || "https://");
  return url === null ? null : url.trim();
}

// ============================================================
// ページタブ
// ============================================================
function renderPageTabs() {
  const wrap = document.getElementById("page-tabs");
  wrap.innerHTML = "";
  const pages = [["home", "ホーム"], ...REGION_KEYS.map((k) => [k, REGION_LABELS[k]])];
  pages.forEach(([key, label]) => {
    const b = el("button", { onclick: () => { currentPage = key; render(); } }, label);
    if (key === currentPage) b.classList.add("active");
    wrap.appendChild(b);
  });
}

// ============================================================
// 共通パーツ(ヘッダー・フッター) ※編集不可のプレビュー
// ============================================================
function siteHeader() {
  return el("header", { class: "site-header" },
    el("span", { class: "site-logo" },
      el("span", { class: "site-logo-text" },
        el("span", { class: "site-logo-title" }, "地域研究愛好会"),
        el("span", { class: "site-logo-sub" }, "AGU AREA STUDIES CLUB"))),
    el("nav", { class: "site-nav" },
      ...REGION_KEYS.map((k) =>
        el("a", { href: "javascript:void(0)", class: k === currentPage ? "active" : "", onclick: () => { currentPage = k; render(); } },
          k.charAt(0).toUpperCase() + k.slice(1)))));
}

function siteFooter() {
  return el("footer", { class: "site-footer" },
    el("span", {}, "© 地域研究愛好会 / AGU Area Studies Club"),
    el("span", {}, "TOKYO, JAPAN"));
}

function sectionHeading(title, eyebrow) {
  return el("div", { style: "display:flex; align-items:baseline; gap:12px; margin-bottom:20px;" },
    el("h2", { style: "margin:0;" }, title),
    eyebrow ? el("span", { class: "eyebrow" }, eyebrow) : null);
}

// ホームページの描画
// ============================================================

    sectionHeading("お知らせ", "NEWS"),
    newsBox,
    el("button", { class: "ed-add", onclick: () => { D.news.unshift({ date: "", title: "", url: "#" }); render(); } }, "＋ お知らせを追加")));

  // サークル概要
  const exWrap = el("div", {});
  D.overview.examples.forEach((_, i) => {
    const holder = { get v() { return D.overview.examples[i]; }, set v(x) { D.overview.examples[i] = x; } };
    const row = el("div", { class: "example-row ed-item" },
      controls(ctlDel(() => { D.overview.examples.splice(i, 1); render(); })),
      el("span", { class: "example-dot" }),
      editable("p", { class: "example-text" }, holder, "v", { placeholder: "具体例を入力…" }));
    exWrap.appendChild(row);
  });

    sectionHeading("サークル概要", "OVERVIEW"),
    el("div", { class: "overview-card" },

      editable("p", { class: "extra-highlight" }, ea, "highlight", { placeholder: "内容" })));

    el("button", { class: "ed-add", onclick: () => { D.activities.pillars.push({ kicker: "", label: "", body: "" }); render(); } }, "＋ 柱を追加"),

  // 活動地域カード
  const regionGrid = el("div", { class: "region-grid" });

    const card = D.regionCards[k];
    regionGrid.appendChild(el("div", { class: "region-card" },

      editable("p", {}, card, "desc")));

  canvas.appendChild(el("section", { style: "padding-top:0;" },
    el("h2", {}, "活動地域"),
    el("p", { class: "section-lead" }, "興味のある地域のページを開くと、その地域の紹介と、メンバーの研究一覧が見られます。(カードの文字は編集できます。上のタブから各地域ページの編集に移れます)"),

  // 参加案内・お問い合わせ
  const contactList = el("div", {});
  D.contact.forEach((c, i) => {
    contactList.appendChild(el("div", { class: "contact-row ed-item" },
      controls(
        ctlLink(() => { const u = promptUrl(c.url); if (u !== null) c.url = u; }),
        ctlDel(() => { D.contact.splice(i, 1); render(); })),
      editable("span", {}, c, "label", { placeholder: "名称" }),
      editable("a", { href: "javascript:void(0)" }, c, "value", { placeholder: "表示テキスト" })));
  });
  canvas.appendChild(el("section", { style: "padding-top:0;" },
    el("div", { class: "join-grid" },
      el("div", { class: "join-note" },
        editable("p", {}, D.join, "note")),
      el("div", { class: "contact-box" },
        el("div", { class: "contact-label" }, "CONTACT"),
        contactList,
        el("button", { class: "ed-add", onclick: () => { D.contact.push({ label: "", value: "", url: "" }); render(); } }, "＋ 連絡先を追加")))));
}

// ============================================================
// 自由セクションの描画
// ============================================================
function renderCustomSection(sec, si) {
  const D = siteData;
  const card = el("div", { class: "overview-card" });

  (sec.blocks || []).forEach((b, bi) => {
    const delBtn = ctlDel(() => { sec.blocks.splice(bi, 1); render(); });

    if (b.type === "heading") {
      card.appendChild(el("div", { class: "ed-item" },
        controls(delBtn),
        editable("h3", { class: "cs-heading" }, b, "text", { placeholder: "見出しを入力…" })));

    } else if (b.type === "text") {
      const rich = richEditable("div", { class: "cs-text" }, b, "html");
      const linkBtn = ctlLink(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || !rich.contains(sel.anchorNode)) {
          alert("先に、リンクを付けたい文字をドラッグで選択してから🔗を押してください。");
          return;
        }
        const u = promptUrl("");
        if (u) { document.execCommand("createLink", false, u); b.html = rich.innerHTML; }
      });
      card.appendChild(el("div", { class: "ed-item" }, controls(linkBtn, delBtn), rich));

    } else if (b.type === "image") {
      const imgHolder = el("div", {});
      function drawImg() {
        imgHolder.innerHTML = "";
        if (b.url) {
          const img = el("img", { src: b.url, alt: "" });
          img.onerror = () => { imgHolder.innerHTML = ""; imgHolder.appendChild(el("div", { class: "ed-img-placeholder" }, "画像を読み込めませんでした。URLを確認してください。")); };
          imgHolder.appendChild(img);
        } else {
          imgHolder.appendChild(el("div", { class: "ed-img-placeholder" }, "下の欄に画像のURLを貼ると、ここに表示されます"));
        }
      }
      drawImg();
      const urlInput = el("input", { class: "ed-img-url", type: "text", placeholder: "画像のURL (例: https://.../photo.jpg)" });
      urlInput.value = b.url || "";
      urlInput.addEventListener("input", () => { b.url = urlInput.value.trim(); drawImg(); });
      card.appendChild(el("figure", { class: "cs-image ed-item", style: "margin:14px 0;" },
        controls(delBtn),
        imgHolder,
        editable("figcaption", { class: "cs-caption" }, b, "caption", { placeholder: "キャプション(任意)" }),
        urlInput));

    } else if (b.type === "divider") {
      card.appendChild(el("div", { class: "ed-item" }, controls(delBtn), el("hr", { class: "cs-divider" })));

    } else if (b.type === "button") {
      card.appendChild(el("p", { class: "ed-item", style: "margin:14px 0 4px;" },
        controls(
          ctlLink(() => { const u = promptUrl(b.url); if (u !== null) b.url = u; }),
          delBtn),
        editable("a", { class: "cs-button", href: "javascript:void(0)" }, b, "label", { placeholder: "ボタンの文字" })));
    }
  });

  // ブロック追加パレット
  card.appendChild(el("div", { class: "ed-palette" },
    el("button", { onclick: () => { sec.blocks.push({ type: "heading", text: "" }); render(); } }, "＋ 見出し"),
    el("button", { onclick: () => { sec.blocks.push({ type: "text", html: "ここに文章を入力…" }); render(); } }, "＋ 文章"),
    el("button", { onclick: () => { sec.blocks.push({ type: "image", url: "", caption: "" }); render(); } }, "＋ 画像"),
    el("button", { onclick: () => { sec.blocks.push({ type: "divider" }); render(); } }, "＋ 区切り線"),
    el("button", { onclick: () => { sec.blocks.push({ type: "button", label: "くわしく見る", url: "#" }); render(); } }, "＋ ボタン(リンク)")));

  const moveUp = el("button", { class: "ed-ctl link", title: "上へ", onclick: () => {
    if (si > 0) { const t = D.customSections[si - 1]; D.customSections[si - 1] = sec; D.customSections[si] = t; render(); }
  } }, "↑");
  const moveDown = el("button", { class: "ed-ctl link", title: "下へ", onclick: () => {
    if (si < D.customSections.length - 1) { const t = D.customSections[si + 1]; D.customSections[si + 1] = sec; D.customSections[si] = t; render(); }
  } }, "↓");

  return el("section", { class: "ed-item", style: "padding-top:0;" },
    controls(moveUp, moveDown, ctlDel(() => { D.customSections.splice(si, 1); render(); })),
    el("div", { style: "display:flex; align-items:baseline; gap:12px; margin-bottom:20px;" },
      editable("h2", { style: "margin:0;" }, sec, "title", { placeholder: "セクション名" }),
      editable("span", { class: "eyebrow" }, sec, "eyebrow", { placeholder: "LABEL" })),
    card);
}

// ============================================================
// 地域ページの描画
// ============================================================
function renderRegion(canvas, key) {
  const hero = siteData.regionHero[key];
  canvas.appendChild(el("div", { class: "hero" },
    editable("span", { class: "eyebrow" }, hero, "en"),
    editable("h1", {}, hero, "jp"),
    editable("p", {}, hero, "intro")));

  const list = el("div", { class: "research-list" });
  const items = researchData[key] || (researchData[key] = []);
  if (items.length === 0) {
    list.appendChild(el("div", { class: "research-empty" }, "まだ研究がありません。下の「＋ 研究を追加」から登録できます。"));
  }
  items.forEach((item, i) => {
    list.appendChild(el("div", { class: "research-card ed-item" },
      controls(
        ctlLink(() => { const u = promptUrl(item.url); if (u !== null) item.url = u; }),
        ctlDel(() => { items.splice(i, 1); render(); })),
      editable("h3", {}, item, "title", { placeholder: "研究のタイトル" }),
      editable("p", {}, item, "desc", { placeholder: "研究の説明文" }),
      el("span", { class: "research-link" }, "研究ページを見る → ", el("small", { style: "color:#9aa1af; font-weight:400;" }, item.url ? "(リンク先: " + item.url + ")" : "(🔗ボタンでリンク先を設定)"))));
  });

  canvas.appendChild(el("section", {},
    el("h2", {}, "研究一覧"),
    el("p", { class: "section-lead" }, "メンバーが取り組んでいる研究の一覧です。カードの🔗ボタンで、別のホームページビルダーで作った研究ページのURLを設定できます。"),
    list,
    el("button", { class: "ed-add", onclick: () => { items.push({ title: "", desc: "", url: "" }); render(); } }, "＋ 研究を追加")));
}

// ============================================================
// 全体描画
// ============================================================
function render() {
  renderPageTabs();
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";
  canvas.appendChild(siteHeader());
  if (currentPage === "home") renderHome(canvas);
  else renderRegion(canvas, currentPage);
  canvas.appendChild(siteFooter());
}

// ============================================================
// ファイル読み込み
// ============================================================
function loadJsFile(inputEl, globalName, onLoaded) {
  inputEl.addEventListener("change", () => {
    const file = inputEl.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const fn = new Function("window", reader.result + "; return window." + globalName + ";");
        const result = fn({});
        if (result) {
          onLoaded(result);
          document.getElementById("status").textContent = "読み込み完了 ✓";
          render();
        }
      } catch (e) {
        alert("読み込みに失敗しました: " + e.message);
      }
    };
    reader.readAsText(file);
  });
}
loadJsFile(document.getElementById("load-site"), "SITE_DATA", (d) => {
  if (!d.customSections) d.customSections = [];
  siteData = d;
});
loadJsFile(document.getElementById("load-research"), "RESEARCH_DATA", (d) => { researchData = d; });

// ============================================================
// 保存(2ファイルをダウンロード)
// ============================================================
function jsStr(s) { return JSON.stringify(s || ""); }

function buildSiteDataJs() {
  const d = siteData;
  let out = "/* site-data.js — ビジュアル編集ツール(editor.html)で生成 */\n\nwindow.SITE_DATA = {\n";
  out += "  hero: { eyebrow: " + jsStr(d.hero.eyebrow) + ", title: " + jsStr(d.hero.title) + ", body: " + jsStr(d.hero.body) + " },\n";
  out += "  news: [\n" + d.news.map((n) => "    { date: " + jsStr(n.date) + ", title: " + jsStr(n.title) + ", url: " + jsStr(n.url || "#") + " }").join(",\n") + "\n  ],\n";
  out += "  customSections: [\n" + d.customSections.map((s) => {
    const blocks = (s.blocks || []).map((b) => {
      if (b.type === "heading") return '      { type: "heading", text: ' + jsStr(b.text) + " }";
      if (b.type === "text") return '      { type: "text", html: ' + jsStr(b.html) + " }";
      if (b.type === "image") return '      { type: "image", url: ' + jsStr(b.url) + ", caption: " + jsStr(b.caption) + " }";
      if (b.type === "divider") return '      { type: "divider" }';
      if (b.type === "button") return '      { type: "button", label: ' + jsStr(b.label) + ", url: " + jsStr(b.url) + " }";
      return "";
    }).filter(Boolean).join(",\n");
    return "    { title: " + jsStr(s.title) + ", eyebrow: " + jsStr(s.eyebrow) + ", blocks: [\n" + blocks + "\n    ] }";
  }).join(",\n") + "\n  ],\n";
  out += "  overview: {\n    lead: " + jsStr(d.overview.lead) + ",\n    examples: [\n" + d.overview.examples.map((e) => "      " + jsStr(e)).join(",\n") + "\n    ]\n  },\n";
  out += "  activities: {\n    pillars: [\n" + d.activities.pillars.map((p) => "      { kicker: " + jsStr(p.kicker) + ", label: " + jsStr(p.label) + ", body: " + jsStr(p.body) + " }").join(",\n") + "\n    ],\n    extra: [\n" + d.activities.extra.map((e) => "      { lead: " + jsStr(e.lead) + ", highlight: " + jsStr(e.highlight) + " }").join(",\n") + "\n    ],\n    note: " + jsStr(d.activities.note) + "\n  },\n";
  out += "  join: { note: " + jsStr(d.join.note) + " },\n";
  out += "  contact: [\n" + d.contact.map((c) => "    { label: " + jsStr(c.label) + ", value: " + jsStr(c.value) + ", url: " + jsStr(c.url) + " }").join(",\n") + "\n  ],\n";
  out += "  regionCards: {\n" + REGION_KEYS.map((k) => "    " + k + ": { title: " + jsStr(d.regionCards[k].title) + ", desc: " + jsStr(d.regionCards[k].desc) + " }").join(",\n") + "\n  },\n";
  out += "  regionHero: {\n" + REGION_KEYS.map((k) => "    " + k + ": { en: " + jsStr(d.regionHero[k].en) + ", jp: " + jsStr(d.regionHero[k].jp) + ", intro: " + jsStr(d.regionHero[k].intro) + " }").join(",\n") + "\n  }\n};\n";
  return out;
}

function buildResearchDataJs() {
  let out = "/* research-data.js — ビジュアル編集ツール(editor.html)で生成 */\n\nwindow.RESEARCH_DATA = {\n\n";
  out += REGION_KEYS.map((key) => {
    const items = researchData[key] || [];
    if (items.length === 0) return "  " + key + ": [\n  ],";
    return "  " + key + ": [\n" + items.map((it) => "    { title: " + jsStr(it.title) + ", desc: " + jsStr(it.desc) + ", url: " + jsStr(it.url) + " },").join("\n") + "\n  ],";
  }).join("\n\n");
  out += "\n\n};\n";
  return out;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: "text/javascript" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadAll() {
  downloadFile("site-data.js", buildSiteDataJs());
  setTimeout(() => downloadFile("research-data.js", buildResearchDataJs()), 400);
  document.getElementById("status").textContent = "ダウンロードしました ✓";
}

render();
</script>
